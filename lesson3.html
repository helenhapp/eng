<!doctype html>

    <link rel="icon" type="image/svg+xml" href="./media/icons/space.svg" />

    <!-- Назва на вкладці -->
    <title>English Lesson 3</title>

    <!-- Скрипт перемикання теми -->
    <script>
      const savedTheme = localStorage.getItem("lms_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      const hljsThemeLink =
        savedTheme === "dark"
          ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
          : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";

      document.head.insertAdjacentHTML(
        "beforeend",
        `<link id="hljs-theme" rel="stylesheet" href="${hljsThemeLink}" />`,
      );
    </script>

    <!-- Підключення шрифтів (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
